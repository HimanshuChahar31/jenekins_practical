name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Show Project Files
        run: ls -la

      - name: Build Step
        run: echo "Build successful"

      - name: Trigger Jenkins
        run: |
          curl -X POST http://localhost:8080/job/jenkins_practical/build
