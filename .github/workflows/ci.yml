name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run Build
        run: echo "Build Successful"

      - name: Trigger Jenkins
        run: |
          curl -X POST http://localhost:8080/job/devops-job/build \
          --user admin:YOUR_API_TOKEN